<!DOCTYPE html>
<html lang="bn">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <title>হিসাব ট্র্যাকার প্রো</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/tabler-icons.min.css">
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <style>
  *{box-sizing:border-box;margin:0;padding:0;}
  
  :root {
    --g50: #f0faf4; --g100: #d1f0de; --g200: #a3e0be; --g400: #3db87a; --g500: #2a9e63; --g600: #1e7a4a; --g700: #155c38; --g800: #0d3f26; --g900: #072918;
    --header-bg: var(--g700); --header-text: var(--g100); --header-sub: #6fcf97;
    --accent: var(--g500); --accent-dark: var(--g600);
    --red-bg: #fde8e8; --red-text: #9b1c1c; --red-dark: #c0392b;
    --amber-bg: #fef3dc; --amber-text: #7a4e00; --amber-dark: #e67e00;
    --blue-bg: #dbeeff; --blue-text: #0c447c;
    --purple-bg: #eeedfe; --purple-text: #26215c;
    --bg-main: #f2f8f4; --card-bg: #fff; --text-main: #1a3a2a; --border-color: var(--g200);
  }

  body.theme-blue {
    --g50: #f0f4fa; --g100: #d1e0f0; --g200: #a3c2e0; --g500: #2a639e; --g600: #1e4a7a; --g700: #15385c; --g800: #0d263f;
    --header-sub: #6fa6cf; --bg-main: #f2f5f8; --text-main: #1a273a;
  }
  body.theme-dark {
    --g50: #222; --g100: #333; --g200: #444; --g500: #444; --g600: #555; --g700: #111; --g800: #aaa;
    --header-bg: #111; --header-text: #eee; --header-sub: #888;
    --bg-main: #1a1a1a; --card-bg: #262626; --text-main: #eee; --border-color: #444;
  }
  body.theme-red {
    --g50: #faf0f0; --g100: #f0d1d1; --g200: #e0a3a3; --g500: #9e2a2a; --g600: #7a1e1e; --g700: #5c1515; --g800: #3f0d0d;
    --header-sub: #cf6f6f; --bg-main: #f8f2f2; --text-main: #3a1a1a;
  }

  html, body {
    margin: 0; padding: 0; width: 100%; height: 100%;
    background: var(--bg-main); font-family: Arial, sans-serif; overflow: hidden;
    color: var(--text-main);
  }
  
  .pf{
    width: 100%; height: 100%; display: flex; flex-direction: column;
    background: var(--bg-main); position: relative; overflow: hidden; margin: 0 auto;
  }
  
  @media (min-width: 768px) {
    body { background: #eef5f0; display: flex; align-items: center; justify-content: center; overflow: auto; }
    .pf { max-width: 450px; height: 85vh; max-height: 800px; border-radius: 32px; border: 2px solid var(--border-color); box-shadow: 0 10px 30px rgba(0,0,0,0.05); }
  }
  
  .ah {
    background: var(--header-bg); color: #fff;
    padding: calc(15px + env(safe-area-inset-top, 0px)) 20px 18px; flex-shrink: 0;
  }
  .ah h1 {font-size:18px; font-weight:500; color:var(--header-text);}
  .ah p {font-size:12px; color:var(--header-sub); margin-top:3px;}
  
  .body{ flex:1; overflow-y:auto; padding:13px; padding-bottom:20px; -webkit-overflow-scrolling: touch; }
  
  .bnav{
    background: var(--card-bg); border-top: 0.5px solid var(--border-color);
    display: flex; flex-shrink: 0; padding: 12px 0 calc(12px + env(safe-area-inset-bottom, 10px)); width: 100%; z-index: 10;
  }
  .nb{flex:1; display:flex; flex-direction:column; align-items:center; gap:4px; border:none; background:transparent; cursor:pointer; padding:4px 0; color:#6b9c7e; outline:none;}
  .nb.active{color:var(--accent);}
  body.theme-dark .nb{color: #777;}
  body.theme-dark .nb.active{color: #fff;}
  .nb i{font-size:20px;}
  .nb span{font-size:9px; font-weight:500;}
  
  .card{background:var(--card-bg); border-radius:14px; border:0.5px solid var(--border-color); padding:13px 14px; margin-bottom:10px;}
  .ct{font-size:13px; color:var(--accent-dark); font-weight:500; margin-bottom:10px; display:flex; align-items:center; gap:6px;}
  body.theme-dark .ct{color: #aaa;}
  .fg{margin-bottom:9px;}
  .fl{font-size:12px; font-weight:500; color:var(--accent-dark); margin-bottom:4px; display:block;}
  body.theme-dark .fl{color: #bbb;}
  .fi{width:100%; padding:9px 11px; font-size:13px; border:0.5px solid var(--border-color); border-radius:8px; background:var(--g50); outline:none; color:var(--text-main);}
  .fi:focus{border-color:var(--accent);}
  
  .fr{display:grid; grid-template-columns:1fr 1fr; gap:8px;}
  
  .sbtn{width:100%; padding:10px; font-size:13px; font-weight:500; background:var(--accent); color:#fff; border:none; border-radius:10px; cursor:pointer; display:flex; align-items:center; justify-content:center; gap:6px; margin-top:4px;}
  .sbtn:active{opacity:.85; transform:scale(.98);}
  .sbtn.red{background:var(--red-dark);}
  .sbtn.amber{background:var(--amber-dark);}
  .sbtn.blue{background:var(--g500);}
  .sbtn.outline{background:transparent; border:1px solid var(--accent); color:var(--accent);}
  
  .li{background:var(--card-bg); border-radius:12px; border:0.5px solid var(--border-color); padding:11px 13px; margin-bottom:8px; display:flex; align-items:center; gap:10px;}
  .ic{width:36px; height:36px; border-radius:10px; display:flex; align-items:center; justify-content:center; font-size:17px; flex-shrink:0;}
  .ic.expense{background:var(--red-bg); color:var(--red-dark);}
  .ii{flex:1; min-width:0;}
  .it{font-size:13px; font-weight:500; color:var(--text-main);}
  .is{font-size:11px; color:#6b9c7e; margin-top:2px;}
  .ia{font-size:14px; font-weight:500; text-align:right;}
  .ia.expense{color:var(--red-dark);}
  .ia.receive{color:var(--accent-dark);}
  .ia.give{color:var(--amber-dark);}
  .db{background:none; border:none; cursor:pointer; padding:4px; color:#6b9c7e; font-size:15px; border-radius:6px; flex-shrink:0;}
  .db:hover{background:var(--red-bg); color:var(--red-dark);}
  
  .sh{font-size:12px; font-weight:500; color:var(--accent-dark); padding:4px 0 8px; display:flex; align-items:center; gap:6px;}
  body.theme-dark .sh{color:#aaa;}
  
  .netbar{display:flex; justify-content:space-between; align-items:center; background:var(--header-bg); border-radius:12px; padding:13px 15px; margin-bottom:10px; color:#fff;}
  .nb-label{font-size:11px; color:var(--header-sub);}
  .nb-val{font-size:20px; font-weight:500;}
  .nb-sub{font-size:11px; color:var(--header-sub); margin-top:2px;}
  
  .stat2{display:grid; grid-template-columns:1fr 1fr; gap:9px; margin-bottom:10px;}
  .sc{border-radius:11px; padding:11px 10px; text-align:center;}
  .sc.g{background:var(--g100);} .sc.g .sl{color:var(--text-main);} .sc.g .sv{color:var(--text-main);}
  .sc.r"><div class="sl">মোট খরচ</div><div class="sv"></div></div>
  .sc.r{background:var(--red-bg);} .sc.r .sl{color:#b22222;} .sc.r .sv{color:var(--red-text);}
  .sl{font-size:10px; font-weight:500; margin-bottom:4px;}
  .sv{font-size:15px; font-weight:500;}
  
  .ac{background:var(--card-bg); border-radius:13px; border:0.5px solid var(--border-color); padding:12px 13px; margin-bottom:9px; display:flex; align-items:center; gap:11px;}
  .alo{width:40px; height:40px; border-radius:10px; display:flex; align-items:center; justify-content:center; font-size:18px; flex-shrink:0;}
  .an{font-size:13px; font-weight:500; color:var(--text-main);}
  .ab{font-size:15px; font-weight:500; color:var(--text-main);}
  
  .ttog{display:grid; grid-template-columns:1fr 1fr; border:0.5px solid var(--border-color); border-radius:8px; overflow:hidden;}
  .tbtn{padding:9px 4px; font-size:12px; font-weight:500; border:none; cursor:pointer; background:var(--g50); color:#6b9c7e;}
  .tbtn.tr{background:var(--g100); color:var(--text-main);}
  .tbtn.tg{background:var(--amber-bg); color:var(--amber-text);}
  .es{text-align:center; padding:18px 0; color:#6b9c7e; font-size:13px;}
  
  .chart-container {position: relative; margin: auto; height: 160px; width: 160px; margin-bottom: 10px;}
  
  /* থিম সুইচার এলিমেন্ট */
  .theme-selector { display: flex; gap: 14px; justify-content: center; padding: 8px 0; }
  .tdot { width: 32px; height: 32px; border-radius: 50%; cursor: pointer; border: 2.5px solid transparent; transition: 0.2s; }
  .tdot.active { border-color: var(--text-main); transform: scale(1.15); }
  
  /* বাজেট প্রোগ্রেস বার */
  .pbar-bg { width: 100%; height: 8px; background: var(--g100); border-radius: 4px; overflow: hidden; margin-top: 6px; }
  .pbar-fill { height: 100%; background: var(--accent); width: 0%; transition: width 0.3s; }
  .pbar-fill.danger { background: var(--red-dark); }

  /* প্রিন্ট স্টাইলিং মিডিয়া কোয়েরি */
  @media print {
    body, html, .pf, .body { background: #fff !important; color: #000 !important; overflow: visible !important; height: auto !important; }
    .bnav, .ah, .bnav, .card:has(#addExpBtn), .card:has(#bAmt), .card:has(#addDebtBtn), .theme-selector, button, input, select, .db, .card:has(input[type="file"]) { display: none !important; }
    .card { border: 1px solid #ccc !important; page-break-inside: avoid; }
    .body { padding: 0 !important; }
  }
  </style>
</head>
<body>

<div class="pf" id="app">
  <div class="ah">
    <h1 id="hTitle">ড্যাশবোর্ড</h1>
    <p id="hSub">আপনার আর্থিক সারসংক্ষেপ</p>
  </div>
  
  <div class="body" id="screenBody"></div>
  
  <div class="bnav">
    <button class="nb active" onclick="sw('dashboard')" id="nav-dashboard"><i class="ti ti-layout-dashboard" aria-hidden="true"></i><span>ড্যাশবোর্ড</span></button>
    <button class="nb" onclick="sw('accounts')" id="nav-accounts"><i class="ti ti-wallet" aria-hidden="true"></i><span>ব্যালেন্স</span></button>
    <button class="nb" onclick="sw('expense')" id="nav-expense"><i class="ti ti-shopping-cart" aria-hidden="true"></i><span>খরচ</span></button>
    <button class="nb" onclick="sw('budget')" id="nav-budget"><i class="ti ti-chart-bar" aria-hidden="true"></i><span>বাজেট</span></button>
    <button class="nb" onclick="sw('debt')" id="nav-debt"><i class="ti ti-users" aria-hidden="true"></i><span>দেনা-পাওনা</span></button>
    <button class="nb" onclick="sw('settings')" id="nav-settings"><i class="ti ti-settings" aria-hidden="true"></i><span>সেটিংস</span></button>
  </div>
</div>

<script>
let myChart = null;
let budgetChart = null;

const ACCTS=[
  {id:'wallet',name:'মানিব্যাগ',type:'নগদ',bg:'#d1f0de',tc:'#0d3f26',icon:'ti-wallet',balance:0},
  {id:'bkash', name:'bKash',   type:'MFS', bg:'#fde8e8',tc:'#9b1c1c',icon:'ti-device-mobile',balance:0},
  {id:'nagad', name:'Nagad',   type:'MFS', bg:'#fef3dc',tc:'#7a4e00',icon:'ti-device-mobile',balance:0},
  {id:'rocket',name:'Rocket',  type:'MFS', bg:'#dbeeff',tc:'#0c447c',icon:'ti-device-mobile',balance:0},
  {id:'islami',name:'Islami Bank',type:'ব্যাংক',bg:'#d1f0de',tc:'#155c38',icon:'ti-building-bank',balance:0},
  {id:'prime', name:'Prime Bank',type:'ব্যাংক',bg:'#eeedfe',tc:'#26215c',icon:'ti-building-bank',balance:0},
];

const DEFAULT_CATS = ['খাবার', 'যাতায়াত', 'শিক্ষা', 'বিদ্যুৎ/গ্যাস', 'চিকিৎসা', 'বিনোদন', 'পোশাক', 'অন্যান্য'];
const DEFAULT_SUBS = {
  'খাবার': ['বাজার', 'রেস্টুরেন্ট', 'নাস্তা'],
  'যাতায়াত': ['বাস', 'রিকশা', 'বাইক'],
  'শিক্ষা': ['বই', 'কোর্স ফি', 'স্টেশনারি'],
  'অন্যান্য': ['সাধারণ']
};

function loadState(){
  try{const s=localStorage.getItem('hisab_state_v2');if(s) return JSON.parse(s);}catch(e){}
  return {
    accounts:JSON.parse(JSON.stringify(ACCTS)),
    expenses:[], debts:[], customCategories: [], subCategories: JSON.parse(JSON.stringify(DEFAULT_SUBS)),
    budgets: {}, theme: 'green',
    nextId:1, activeTab:'dashboard', debtType:'receive'
  };
}

let S = loadState();
if(!S.subCategories) S.subCategories = JSON.parse(JSON.stringify(DEFAULT_SUBS));
if(!S.budgets) S.budgets = {};
if(!S.theme) S.theme = 'green';
if(!S.customCategories) S.customCategories = [];

document.body.className = S.theme === 'green' ? '' : 'theme-' + S.theme;

function getTodayDate() {
  const today = new Date();
  const yyyy = today.getFullYear();
  let mm = today.getMonth() + 1; let dd = today.getDate();
  if (dd < 10) dd = '0' + dd; if (mm < 10) mm = '0' + mm;
  return yyyy + '-' + mm + '-' + dd;
}

function save(){try{localStorage.setItem('hisab_state_v2',JSON.stringify(S));}catch(e){}}
function tk(n){return '৳'+Math.round(Number(n)).toLocaleString('en-IN');}
function totBal(){return S.accounts.reduce((s,a)=>s+Number(a.balance),0);}
function totExp(){return S.expenses.reduce((s,e)=>s+Number(e.amount),0);}
function totRecv(){return S.debts.filter(d=>d.type==='receive').reduce((s,d)=>s+Number(d.amount),0);}
function totPay(){return S.debts.filter(d=>d.type==='give').reduce((s,d)=>s+Number(d.amount),0);}
function acctName(id){const a=S.accounts.find(a=>a.id===id);return a?a.name:'?';}

function getAllCategories() { return [...DEFAULT_CATS, ...S.customCategories]; }
function getSubsForCat(cat) { return S.subCategories[cat] || ['সাধারণ']; }

function sw(tab){
  S.activeTab=tab; save();
  document.querySelectorAll('.nb').forEach(b=>b.classList.remove('active'));
  document.getElementById('nav-'+tab).classList.add('active');
  const h={
    dashboard:['ড্যাশবোর্ড','আপনার আর্থিক সারসংক্ষেপ'],
    accounts:['ব্যালেন্স','সকল অ্যাকাউন্টের হিসাব'],
    expense:['খরচের হিসাব','খরচ যোগ করুন ও দেখুন'],
    budget:['বাজেট প্ল্যানার','খাতভিত্তিক মাসিক বাজেট'],
    debt:['দেনা-পাওনা','ধার দেওয়া ও নেওয়ার হিসাব'],
    settings:['সেটিংস ও কন্ট্রোল প্যানেল','অ্যাপ কাস্টমাইজেশন ও ব্যাকআপ রিপোর্ট']
  };
  document.getElementById('hTitle').textContent=h[tab][0];
  document.getElementById('hSub').textContent=h[tab][1];
  render();
}

function render(){
  const b=document.getElementById('screenBody');
  if(S.activeTab==='dashboard') { b.innerHTML=rDash(); initChart(); }
  else if(S.activeTab==='accounts') b.innerHTML=rAccts();
  else if(S.activeTab==='expense') b.innerHTML=rExp();
  else if(S.activeTab==='budget') { b.innerHTML=rBudget(); initBudgetChart(); }
  else if(S.activeTab==='debt') b.innerHTML=rDebt();
  else b.innerHTML=rSettings();
  attachEv();
}

function changeTheme(tname) {
  S.theme = tname;
  document.body.className = tname === 'green' ? '' : 'theme-' + tname;
  save(); render();
}

function initChart() {
  const ctx = document.getElementById('pieChart');
  if(!ctx) return;
  if(myChart) myChart.destroy();
  myChart = new Chart(ctx, {
    type: 'pie',
    data: {
      labels: ['ব্যালেন্স', 'খরচ'],
      datasets: [{ data: [totBal(), totExp()], backgroundColor: [S.theme==='dark'?'#666':'#2a9e63', '#c0392b'], borderWidth: 1 }]
    },
    options: { responsive: true, maintainAspectRatio: false, plugins: { legend: { display: false } } }
  });
}

function initBudgetChart() {
  const ctx = document.getElementById('bChart');
  if(!ctx) return;
  if(budgetChart) budgetChart.destroy();
  
  let totB = 0; Object.values(S.budgets).forEach(v => totB += Number(v));
  if(totB === 0 && totExp() === 0) return;

  budgetChart = new Chart(ctx, {
    type: 'doughnut',
    data: {
      labels: ['মোট বাজেট', 'মোট খরচ'],
      datasets: [{ data: [totB, totExp()], backgroundColor: ['#2a639e', '#c0392b'], borderWidth: 1 }]
    },
    options: { responsive: true, maintainAspectRatio: false, plugins: { legend: { display: false } } }
  });
}

function rDash(){
  const w=S.accounts.find(a=>a.id==='wallet');
  return `
  <div class="netbar">
    <div><div class="nb-label">সকল অ্যাকাউন্ট মিলিয়ে</div><div class="nb-val">${tk(totBal())}</div><div class="nb-sub">মোট ব্যালেন্স</div></div>
    <i class="ti ti-report-money" style="font-size:30px;" aria-hidden="true"></i>
  </div>
  
  <div class="card" style="display:flex; flex-direction:column; align-items:center; padding: 10px;">
    <div class="ct" style="width:100%;"><i class="ti ti-chart-pie"></i> খরচের পাই চার্ট</div>
    <div class="chart-container"><canvas id="pieChart"></canvas></div>
  </div>

  <div class="stat2">
    <div class="sc r"><div class="sl">মোট খরচ</div><div class="sv">${tk(totExp())}</div></div>
    <div class="sc g"><div class="sl">হাতে নগদ (মানিব্যাগ)</div><div class="sv">${tk(w?w.balance:0)}</div></div>
  </div>`;
}

function rAccts(){
  return `<div class="card"><div style="display:flex;justify-content:space-between;align-items:center;"><span style="font-size:13px;">সর্বমোট ব্যালেন্স</span><span style="font-size:18px;font-weight:500;">${tk(totBal())}</span></div></div>
  ${S.accounts.map(a=>`
    <div class="ac" style="padding:10px; margin-bottom:6px;">
      <div class="alo" style="background:${S.theme==='dark'?'#444':a.bg}; width:34px; height:34px;"><i class="ti ${a.icon}" style="font-size:16px; color:${S.theme==='dark'?'#fff':a.tc}"></i></div>
      <div style="flex:1;"><div class="an">${a.name}</div></div>
      <div style="text-align:right; display:flex; align-items:center; gap:8px;">
        <div class="ab" style="font-size:14px;">${tk(a.balance)}</div>
        <button class="db" onclick="editAcctBal('${a.id}')"><i class="ti ti-edit"></i></button>
      </div>
    </div>`).join('')}`;
}

function rExp(){
  const allCats = getAllCategories();
  const firstCat = allCats[0];
  const subs = getSubsForCat(firstCat);
  
  return `<div class="card">
    <div class="ct"><i class="ti ti-plus-circle"></i> নতুন খরচ যোগ করুন</div>
    <div class="fr">
      <div class="fg"><label class="fl">টাকার পরিমাণ</label><input class="fi" type="number" id="eAmt" placeholder="০"></div>
      <div class="fg"><label class="fl">তারিখ</label><input class="fi" type="date" id="eDate" value="${getTodayDate()}"></div>
    </div>
    
    <div class="fr">
      <div class="fg">
        <label class="fl">মূল খাত</label>
        <select class="fi" id="eCat" onchange="updateSubDropdown()">${allCats.map(c=>`<option value="${c}">${c}</option>`).join('')}</select>
      </div>
      <div class="fg">
        <label class="fl">উপখাত</label>
        <select class="fi" id="eSubCat">${subs.map(s=>`<option value="${s}">${s}</option>`).join('')}</select>
      </div>
    </div>
    
    <div class="fr">
      <div class="fg" style="grid-column: span 2;"><label class="fl">অ্যাকাউন্ট</label><select class="fi" id="eAcct">${S.accounts.map(a=>`<option value="${a.id}">${a.name}</option>`).join('')}</select></div>
    </div>
    
    <div class="fg"><label class="fl">বিবরণ (ঐচ্ছিক)</label><input class="fi" type="text" id="eDesc" placeholder="বাজারের অতিরিক্ত বিবরণ..."></div>
    <button class="sbtn" id="addExpBtn">খরচ সেভ করুন</button>
  </div>
  
  <div class="sh">আজকের খরচের তালিকা</div>
  ${S.expenses.length===0?'<div class="es">কোনো খরচ নেই</div>':[...S.expenses].reverse().map(e=>`
    <div class="li">
      <div class="ic expense"><i class="ti ti-shopping-cart"></i></div>
      <div class="ii">
        <div class="it">${e.category} (${e.subCategory || 'সাধারণ'})</div>
        <div class="is">${e.date} · ${acctName(e.acct)} ${e.desc?'· '+e.desc:''}</div>
      </div>
      <div style="display:flex;align-items:center;gap:6px;">
        <div class="ia expense">${tk(e.amount)}</div>
        <button class="db" onclick="delExp(${e.id})"><i class="ti ti-trash"></i></button>
      </div>
    </div>`).join('')}`;
}

function rBudget() {
  const allCats = getAllCategories();
  let totalBudget = 0; Object.values(S.budgets).forEach(v => totalBudget += Number(v));

  return `
  <div class="card">
    <div class="ct"><i class="ti ti-plus-circle"></i> বাজেট সেট করুন</div>
    <div class="fr">
      <div class="fg"><label class="fl">খাত নির্বাচন করুন</label><select class="fi" id="bCat">${allCats.map(c=>`<option value="${c}">${c}</option>`).join('')}</select></div>
      <div class="fg"><label class="fl">বাজেট পরিমাণ (৳)</label><input class="fi" type="number" id="bAmt" placeholder="২০০০"></div>
    </div>
    <button class="sbtn" onclick="saveBudget()">বাজেট সেভ করুন</button>
  </div>

  <div class="sh">খাতভিত্তিক বাজেট ও লাইভ ট্র্যাকিং (মোট: ${tk(totalBudget)})</div>
  ${allCats.map(c => {
    const budget = S.budgets[c] || 0;
    if(budget === 0) return '';
    const spent = S.expenses.filter(e => e.category === c).reduce((sum, e) => sum + Number(e.amount), 0);
    let pct = budget > 0 ? (spent / budget) * 100 : 0;
    if(pct > 100) pct = 100;
    return `
    <div class="card" style="margin-bottom:8px; padding:10px 12px;">
      <div style="display:flex; justify-content:space-between; font-size:12px;">
        <span style="font-weight:bold;">${c}</span>
        <span>ব্যয়: ${tk(spent)} / বাজেট: ${tk(budget)}</span>
      </div>
      <div class="pbar-bg"><div class="pbar-fill ${spent > budget ? 'danger' : ''}" style="width: ${pct}%;"></div></div>
    </div>`;
  }).join('') || '<div class="es">কোনো বাজেট সেট করা নেই</div>'}

  <div class="card" style="display:flex; flex-direction:column; align-items:center; padding: 10px; margin-top:15px;">
    <div class="ct" style="width:100%;"><i class="ti ti-chart-donut"></i> বাজেট বনাম খরচ অনুপাত</div>
    <div class="chart-container"><canvas id="bChart"></canvas></div>
  </div>`;
}

function rDebt(){
  const recv=S.debts.filter(d=>d.type==='receive'); const pay=S.debts.filter(d=>d.type==='give');
  return `<div class="card">
    <div class="ct"><i class="ti ti-plus-circle"></i> নতুন দেনা-পাওনা</div>
    <div class="fg"><label class="fl">ব্যক্তির নাম</label><input class="fi" type="text" id="dName" placeholder="নাম..."></div>
    <div class="fr">
      <div class="fg"><label class="fl">টাকার পরিমাণ</label><input class="fi" type="number" id="dAmt" placeholder="০"></div>
      <div class="fg"><label class="fl">ধরন</label><div class="ttog"><button class="tbtn ${S.debtType==='receive'?'tr':''}" onclick="setDebtType('receive')">পাব</button><button class="tbtn ${S.debtType==='give'?'tg':''}" onclick="setDebtType('give')">দেব</button></div></div>
    </div>
    <div class="fg"><label class="fl">বিবরণ</label><input class="fi" type="text" id="dDesc" placeholder="বিবরণ..."></div>
    <button class="sbtn ${S.debtType==='give'?'amber':''}" id="addDebtBtn">যোগ করুন</button>
  </div>
  <div class="sh">আমি পাব — ${tk(totRecv())}</div>
  ${recv.length===0?'<div class="es">কেউ পাওনা নেই</div>':recv.map(d=>`<div class="li"><div class="ic receive"><i class="ti ti-arrow-down-left"></i></div><div class="ii"><div class="it">${d.name}</div><div class="is">${d.desc||''}</div></div><div style="display:flex;align-items:center;gap:6px;"><div class="ia receive">${tk(d.amount)}</div><button class="db" onclick="delDebt(${d.id})"><i class="ti ti-trash"></i></button></div></div>`).join('')}
  <div class="sh">আমি দেব — ${tk(totPay())}</div>
  ${pay.length===0?'<div class="es">কাউকে দেওয়া নেই</div>':pay.map(d=>`<div class="li"><div class="ic give"><i class="ti ti-arrow-up-right"></i></div><div class="ii"><div class="it">${d.name}</div><div class="is">${d.desc||''}</div></div><div style="display:flex;align-items:center;gap:6px;"><div class="ia give">${tk(d.amount)}</div><button class="db" onclick="delDebt(${d.id})"><i class="ti ti-trash"></i></button></div></div>`).join('')}`;
}

function rSettings(){
  const allCats = getAllCategories();
  return `
  <!-- ১. থিম ম্যানেজমেন্ট -->
  <div class="card" style="text-align:center;">
    <div class="ct" style="justify-content:center;"><i class="ti ti-palette"></i> অ্যাপের কালার থিম</div>
    <div class="theme-selector">
      <div class="tdot ${S.theme==='green'?'active':''}" style="background:#2a9e63;" onclick="changeTheme('green')"></div>
      <div class="tdot ${S.theme==='blue'?'active':''}" style="background:#2a639e;" onclick="changeTheme('blue')"></div>
      <div class="tdot ${S.theme==='red'?'active':''}" style="background:#9e2a2a;" onclick="changeTheme('red')"></div>
      <div class="tdot ${S.theme==='dark'?'active':''}" style="background:#333;" onclick="changeTheme('dark')"></div>
    </div>
  </div>

  <!-- ২. প্রিন্ট রিপোর্ট -->
  <div class="card">
    <div class="ct"><i class="ti ti-printer"></i> প্রিন্ট এবং পিডিএফ রিপোর্ট</div>
    <button class="sbtn blue" onclick="window.print()"><i class="ti ti-file-text"></i> রিপোর্ট প্রিন্ট / PDF সেভ করুন</button>
  </div>

  <!-- ৩. ক্যাটাগরি ও সাব-ক্যাটাগরি কাস্টমাইজেশন -->
  <div class="card">
    <div class="ct"><i class="ti ti-category"></i> ম্যানুয়ালি খাত ও উপখাত যোগ করুন</div>
    <div class="fg">
      <label class="fl">নতুন মূল খাত</label>
      <div style="display:flex; gap:6px;">
        <input class="fi" type="text" id="newCatName" placeholder="উদা: ফ্রিল্যান্সিং">
        <button class="sbtn" style="width:70px; margin-top:0;" onclick="addCustomCat()">যোগ</button>
      </div>
    </div>
    <div class="fg" style="margin-top:12px;">
      <label class="fl">মূল খাত নির্বাচন করুন</label>
      <select class="fi" id="selectParentCat">${allCats.map(c=>`<option value="${c}">${c}</option>`).join('')}</select>
    </div>
    <div class="fg">
      <label class="fl">উক্ত খাতের নতুন উপখাত</label>
      <div style="display:flex; gap:6px;">
        <input class="fi" type="text" id="newSubCatName" placeholder="উদা: ক্লায়েন্ট বোনাস">
        <button class="sbtn amber" style="width:70px; margin-top:0;" onclick="addCustomSubCat()">যোগ</button>
      </div>
    </div>
  </div>

  <!-- ৪. ডেটা ব্যাকআপ ও রেস্টোর -->
  <div class="card">
    <div class="ct"><i class="ti ti-database"></i> ডেটা ব্যাকআপ ও রেস্টোর</div>
    <button class="sbtn outline" onclick="exportData()"><i class="ti ti-download"></i> ব্যাকআপ ফাইল (JSON) ডাউনলোড করুন</button>
    <div style="margin-top:12px;">
      <label class="fl">ব্যাকআপ ফাইল থেকে রেস্টোর করুন</label>
      <input type="file" id="importFile" accept=".json" style="font-size:12px; margin-top:4px;" onchange="importData(event)">
    </div>
  </div>

  <div class="card" style="margin-top:15px;"><div class="ct" style="color:#c0392b;"><i class="ti ti-alert-triangle"></i> সব ডেটা রিসেট করুন</div><button class="sbtn red" onclick="clearAllData()">সব ডেটা মুছে ফেলুন</button></div>`;
}

function updateSubDropdown() {
  const cat = document.getElementById('eCat').value;
  const subSelect = document.getElementById('eSubCat');
  if(subSelect) {
    subSelect.innerHTML = getSubsForCat(cat).map(s=>`<option value="${s}">${s}</option>`).join('');
  }
}

function addCustomCat() {
  const input = document.getElementById('newCatName');
  const name = input ? input.value.trim() : "";
  if(name !== "") {
    if(getAllCategories().includes(name)) return alert('এই খাতটি ইতিমধ্যেই আছে!');
    S.customCategories.push(name); save(); render();
    alert('নতুন মূল খাত সফলভাবে যুক্ত হয়েছে!');
  } else { alert('খাতের নাম লিখুন!'); }
}

function addCustomSubCat() {
  const cat = document.getElementById('selectParentCat').value;
  const input = document.getElementById('newSubCatName');
  const name = input ? input.value.trim() : "";
  if(name !== "") {
    if(!S.subCategories[cat]) S.subCategories[cat] = [];
    if(S.subCategories[cat].includes(name)) return alert('এই উপখাতটি ইতিমধ্যেই আছে!');
    S.subCategories[cat].push(name); save(); render();
    alert(`${cat} খাতে নতুন উপখাত সফলভাবে যুক্ত হয়েছে!`);
  } else { alert('উপখাতের নাম লিখুন!'); }
}

function saveBudget() {
  const cat = document.getElementById('bCat').value;
  const amt = document.getElementById('bAmt').value;
  if(!amt || Number(amt) < 0) return alert('সঠিক পরিমাণ লিখুন!');
  S.budgets[cat] = Number(amt); save(); render();
}

function editAcctBal(id) {
  const amt = prompt('নতুন ব্যালেন্স ইনপুট করুন (৳):');
  if(amt !== null && !isNaN(amt) && Number(amt) >= 0) {
    const idx = S.accounts.findIndex(a=>a.id===id);
    if(idx > -1) { S.accounts[idx].balance = Number(amt); save(); render(); }
  }
}

function setDebtType(t) { S.debtType = t; render(); }

function delExp(id) {
  if(confirm('মুছে ফেলবেন?')){
    const exp = S.expenses.find(e=>e.id===id);
    if(exp){ const ai=S.accounts.findIndex(a=>a.id===exp.acct); if(ai>-1) S.accounts[ai].balance+=Number(exp.amount); }
    S.expenses = S.expenses.filter(e=>e.id!==id); save(); render();
  }
}

function delDebt(id) { if(confirm('মুছে ফেলবেন?')){ S.debts = S.debts.filter(d=>d.id!==id); save(); render(); } }

function exportData() {
  const blob = new Blob([JSON.stringify(S)],{type:'application/json'});
  const url = URL.createObjectURL(blob); const a = document.createElement('a');
  a.href = url; a.download = 'hisab_pro_backup.json'; a.click();
}

function importData(event) {
  const file = event.target.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = function(e) {
    try {
      const importedState = JSON.parse(e.target.result);
      if (importedState && (importedState.expenses || importedState.accounts)) {
        S = importedState;
        save();
        document.body.className = S.theme === 'green' ? '' : 'theme-' + S.theme;
        sw('dashboard');
        alert('ডেটা সফলভাবে রেস্টোর করা হয়েছে!');
      } else { alert('ভুল ফাইল ফরম্যাট!'); }
    } catch (err) { alert('ফাইলটি পড়া সম্ভব হয়নি, সঠিক JSON ফাইল আপলোড করুন।'); }
  };
  reader.readAsText(file);
}

function clearAllData() { if(confirm('সাবধান! আপনার সব জমানো হিসাব মুছে যাবে। ডিলিট করবেন?')){ localStorage.removeItem('hisab_state_v2'); S=loadState(); sw('dashboard'); } }

function attachEv(){
  const ae=document.getElementById('addExpBtn');
  if(ae) ae.onclick=()=>{
    const amt=document.getElementById('eAmt').value; const date=document.getElementById('eDate').value;
    const cat=document.getElementById('eCat').value; const sub=document.getElementById('eSubCat').value;
    const desc=document.getElementById('eDesc').value.trim(); const acct=document.getElementById('eAcct').value;
    if(!amt||Number(amt)<=0) return alert('সঠিক পরিমাণ লিখুন!');
    S.expenses.push({id:S.nextId++, amount:Number(amt), category:cat, subCategory:sub, date:date||getTodayDate(), desc, acct});
    const ai=S.accounts.findIndex(a=>a.id===acct); if(ai>-1) S.accounts[ai].balance=Math.max(0, S.accounts[ai].balance-Number(amt));
    save(); render();
  };
  
  const ad=document.getElementById('addDebtBtn');
  if(ad) ad.onclick=()=>{
    const name=document.getElementById('dName').value.trim(); const amt=document.getElementById('dAmt').value; const desc=document.getElementById('dDesc').value.trim();
    if(!name||!amt||Number(amt)<=0) return alert('সঠিক তথ্য দিন!');
    S.debts.push({id:S.nextId++, name, amount:Number(amt), type:S.debtType, desc});
    save(); render();
  };
}

render();
</script>
</body>
</html>
